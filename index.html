<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamawatchu - Gamified Productivity Pet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">🌙 Tamawatchu</h1>
            <div class="header-right">
                <div class="token-display">⚡ <span id="tokenCount">0</span></div>
                <select id="scheduleSelect" class="schedule-select">
                    <option value="school">🏫 School Schedule</option>
                    <option value="summer">☀️ Summer Schedule</option>
                    <option value="holiday">😴 Holiday Vacation</option>
                </select>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-area">
            <!-- Left Sidebar: Pet & Health -->
            <section class="pet-section">
                <div class="pet-container">
                    <div id="petBlob" class="pet-blob"></div>
                    <div class="pet-name-display" id="petNameDisplay">Tamawatchu</div>
                    <div class="revive-indicator" id="reviveIndicator">🛡️ Totems: 1</div>
                </div>

                <!-- Health Bar -->
                <div class="health-section">
                    <label class="health-label">Health</label>
                    <div class="health-bar-container">
                        <div id="healthBar" class="health-bar"></div>
                    </div>
                    <div class="health-text">
                        <span id="healthValue">100</span> / 100 HP
                    </div>
                </div>

                <!-- Clock Mascot -->
                <div class="clock-section">
                    <div id="clockContainer" class="clock-container"></div>
                    <div id="urgencyMessage" class="urgency-message"></div>
                </div>
            </section>

            <!-- Right Content: Tasks & Capsule -->
            <section class="content-section">
                <!-- Task Manager -->
                <div class="task-manager card">
                    <h2>📋 Tasks</h2>

                    <!-- Add Task Form -->
                    <div class="add-task-form">
                        <input
                            id="taskTitle"
                            type="text"
                            placeholder="Task title..."
                            class="input"
                            maxlength="100"
                        >
                        <textarea
                            id="taskDescription"
                            placeholder="Description (optional)"
                            class="input"
                            maxlength="300"
                            rows="2"
                        ></textarea>

                        <!-- Difficulty Stars -->
                        <div class="difficulty-section">
                            <label>Difficulty:</label>
                            <div class="star-selector">
                                <label><input type="radio" name="difficulty" value="1"> ⭐</label>
                                <label><input type="radio" name="difficulty" value="2"> ⭐⭐</label>
                                <label><input type="radio" name="difficulty" value="3"> ⭐⭐⭐</label>
                                <label><input type="radio" name="difficulty" value="4"> ⭐⭐⭐⭐</label>
                                <label><input type="radio" name="difficulty" value="5"> ⭐⭐⭐⭐⭐</label>
                            </div>
                        </div>

                        <!-- Deadline -->
                        <div class="deadline-section">
                            <label for="taskDeadline">Deadline:</label>
                            <input
                                id="taskDeadline"
                                type="datetime-local"
                                class="input"
                            >
                        </div>

                        <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
                    </div>

                    <!-- Task List -->
                    <div id="taskList" class="task-list">
                        <div class="empty-state">No tasks yet. Create one!</div>
                    </div>
                </div>

                <!-- Claw Machine with Face -->
                <div class="claw-machine-section card">
                    <h2>🎪 Claw Machine</h2>
                    <p class="machine-cost">Cost: 50 ⚡</p>

                    <div class="claw-machine-container">
                        <!-- Machine body -->
                        <div class="machine-body">
                            <!-- Machine Face -->
                            <svg id="clawFace" class="claw-machine-face" viewBox="0 0 100 100" style="width: 100%; max-width: 180px; margin-bottom: 10px;">
                                <circle cx="50" cy="50" r="40" fill="#F8D9E8" stroke="#A8A8A8" stroke-width="2"/>

                                <!-- Eyes -->
                                <ellipse id="eyeLeft" cx="35" cy="40" rx="8" ry="8" fill="white" stroke="#A8A8A8" stroke-width="1.5"/>
                                <ellipse id="pupilLeft" cx="35" cy="40" rx="4" ry="6" fill="#333"/>

                                <ellipse id="eyeRight" cx="65" cy="40" rx="8" ry="8" fill="white" stroke="#A8A8A8" stroke-width="1.5"/>
                                <ellipse id="pupilRight" cx="65" cy="40" rx="4" ry="6" fill="#333"/>

                                <!-- Cheeks -->
                                <circle id="cheekLeft" cx="20" cy="50" r="5" fill="#F5D9E0" opacity="0.5"/>
                                <circle id="cheekRight" cx="80" cy="50" r="5" fill="#F5D9E0" opacity="0.5"/>

                                <!-- Mouth -->
                                <path id="mouth" d="M 35 65 Q 50 75 65 65" stroke="#A8A8A8" stroke-width="2" fill="none" stroke-linecap="round"/>
                            </svg>

                            <!-- Glass window -->
                            <div class="machine-window">
                                <div class="machine-interior">
                                    <!-- Items in machine -->
                                    <div id="machineItems" class="machine-items">
                                        <div class="capsule">✨</div>
                                        <div class="capsule">💎</div>
                                        <div class="capsule">🎀</div>
                                        <div class="capsule">👓</div>
                                        <div class="capsule">🌟</div>
                                    </div>

                                    <!-- Claw mechanism -->
                                    <div class="claw-mechanism">
                                        <div class="claw-frame"></div>
                                        <div class="claw-gripper">
                                            <div class="claw-finger left"></div>
                                            <div class="claw-finger right"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Coin slot area -->
                            <div class="coin-slot">
                                <p>Insert 50 ⚡</p>
                            </div>

                            <!-- Dispenser slot -->
                            <div class="dispenser-slot">
                                <div id="dispenserItem" class="dispenser-item"></div>
                            </div>
                        </div>
                    </div>

                    <button id="clawMachineBtn" class="btn btn-primary btn-large">Play (50 ⚡)</button>
                    <div id="machineResult" class="machine-result"></div>
                </div>

                <!-- Inventory -->
                <div class="inventory-section card">
                    <h2>🎒 Inventory</h2>
                    <div id="inventory" class="inventory">
                        <div class="empty-state">No items yet.</div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Item Description Modal -->
        <div id="itemModal" class="modal">
            <div class="modal-content">
                <span class="modal-close" id="modalClose">&times;</span>
                <div class="modal-item-emoji" id="modalItemEmoji">✨</div>
                <div class="modal-item-name" id="modalItemName">Item Name</div>
                <div class="modal-item-description" id="modalItemDescription">Description here</div>
                <div class="modal-item-effect" id="modalItemEffect" style="display: none;"></div>
            </div>
        </div>

        <!-- Particle Container for Confetti -->
        <div id="particleContainer" class="particle-container"></div>
    </div>

    <!-- Scripts -->
    <script src="js/game-state.js"></script>
    <script src="js/pet.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/health.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/capsule.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
